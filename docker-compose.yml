services:
  # =============================================================================
  # Core Infrastructure
  # =============================================================================

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cicero
      POSTGRES_USER: cicero
      POSTGRES_PASSWORD: cicero
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cicero"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: ghcr.io/kukymbr/goose-docker:latest
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    environment:
      GOOSE_DRIVER: postgres
      GOOSE_DBSTRING: "host=postgres port=5432 user=cicero password=cicero dbname=cicero sslmode=disable"
      GOOSE_MIGRATION_DIR: /migrations

  # =============================================================================
  # Translation Sidecar
  # =============================================================================

  libretranslate:
    image: libretranslate/libretranslate:latest
    environment:
      LT_LOAD_ONLY: "en,es,fr,de,pt,it,nl,pl,ru,zh,ja,ko"
      LT_DISABLE_WEB_UI: "true"
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/languages"]
      interval: 10s
      timeout: 5s
      retries: 10

  translator:
    build:
      context: .
      dockerfile: services/translator/Dockerfile
    depends_on:
      libretranslate:
        condition: service_healthy
    environment:
      TRANSLATOR_LISTEN_ADDR: ":9091"
      LIBRETRANSLATE_ADDR: "http://libretranslate:5000"
    ports:
      - "9091:9091"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9091 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =============================================================================
  # Observability Stack
  # =============================================================================

  # Traces - Jaeger
  jaeger:
    image: jaegertracing/all-in-one:latest
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"  # UI

  # Logs - Loki
  loki:
    image: grafana/loki:latest
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - lokidata:/loki

  # Metrics - Prometheus
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./tools/dev/prometheus.yaml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    ports:
      - "9090:9090"

  # OTEL Collector - Central hub
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    volumes:
      - ./tools/dev/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4318:4318"    # OTLP HTTP
    depends_on:
      - jaeger
      - loki
      - prometheus

  # Grafana - Unified dashboard
  grafana:
    image: grafana/grafana:latest
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    ports:
      - "3000:3000"
    volumes:
      - grafanadata:/var/lib/grafana
      - ./tools/dev/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
      - jaeger

  # =============================================================================
  # Application
  # =============================================================================

  app:
    build:
      context: .
      dockerfile: tools/dev/Dockerfile.dev
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      translator:
        condition: service_healthy
    environment:
      APP_PORT: "8080"
      APP_DB_HOST: postgres
      APP_DB_PORT: "5432"
      APP_DB_NAME: cicero
      APP_DB_USER: cicero
      APP_DB_PASSWORD: cicero
      APP_DB_SSLMODE: disable
      APP_TRANSLATOR_ADDR: translator:9091
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: cicero
    ports:
      - "8080:8080"
    volumes:
      - .:/app

volumes:
  pgdata:
  lokidata:
  prometheusdata:
  grafanadata:
