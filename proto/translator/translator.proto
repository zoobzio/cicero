syntax = "proto3";

package translator;

option go_package = "github.com/zoobz-io/cicero/proto/translator";

// TranslatorService provides text translation via the sidecar.
service TranslatorService {
  // Translate sends text to the translation backend and returns the translated result.
  rpc Translate(TranslateRequest) returns (TranslateResponse);
}

// TranslateRequest contains the text and language parameters for a translation call.
message TranslateRequest {
  string text = 1;
  string source_language = 2;
  string target_language = 3;
  string route = 4;
}

// TranslateResponse contains the translated text and the provider that handled the request.
message TranslateResponse {
  string translated_text = 1;
  string provider = 2;
}
